name: tests
on:
  push:
  pull_request:

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # Hermetic: stdlib-only subprocess contract tests (gate, bash-guard,
      # session brief, codex apply_patch fixtures, manifest/mirror canaries).
      - run: python3 tests/test_hooks.py
